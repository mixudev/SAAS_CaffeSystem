server {
    listen 80;
    server_name localhost;

    # Gzip Compression untuk optimalisasi bandwidth & speed
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # Root Nginx serving static media files from shared volume (optional)
    location /storage/ {
        alias /var/www/backend/storage/app/public/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # API Backend proxying (Laravel API FPM or HTTP)
    # Laravel API running inside the container laravel-api (FPM port 9000 or HTTP reverse proxy if octanes/swoole is used)
    # Since we are using standard FPM, we can use fastcgi_pass.
    # However, Nginx needs to know how to locate the php files inside the laravel-api container.
    # A very standard and robust way is to proxy to a local Nginx inside the laravel container, 
    # OR we can configure Nginx to route to fastcgi directly by mapping the root folder inside the nginx container.
    # Let's map the PHP FPM request directly to laravel-api:9000.
    # For this, Nginx needs to have the same root path as the PHP container (/var/www/html/public) or pass script filename.
    location ~ ^/(api|sanctum|_debugbar) {
        root /var/www/html/public;
        fastcgi_pass laravel-api:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/html/public;
        
        # Security headers
        fastcgi_hide_header X-Powered-By;
        
        # Buffer settings untuk optimization
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        
        # CORS & Client Headers
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $http_host;
    }

    # Frontend React App proxying (to cafe-frontend Nginx port 80)
    location / {
        proxy_pass http://react-app:80;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $http_host;
        
        # WebSockets support (untuk HMR di development jika diaktifkan, dll)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
