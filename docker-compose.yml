services:
  # Nginx Reverse Proxy (Entrypoint)
  nginx:
    image: nginx:1.27-alpine
    container_name: cafe-nginx
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - type: bind
        source: ./nginx/conf.d
        target: /etc/nginx/conf.d
        read_only: true
      - type: bind
        source: ./backend/storage/app/public
        target: /var/www/backend/storage/app/public
        read_only: true
    depends_on:
      - react-app
      - laravel-api
    networks:
      - cafe-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend App (ReactJS + Vite served via Nginx Alpine)
  react-app:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: cafe-frontend
    networks:
      - cafe-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${FRONTEND_MEM_LIMIT:-128M}

  # Frontend Dev Server (Vite HMR — hot reload)
  react-app-dev:
    build:
      context: .
      dockerfile: docker/frontend/dev.Dockerfile
    container_name: cafe-frontend-dev
    volumes:
      - ./frontend:/app:delegated
    ports:
      - "${VITE_PORT:-5173}:5173"
    networks:
      - cafe-network
    restart: unless-stopped
    profiles:
      - dev

  # Backend API (Laravel 13 - PHP 8.4 FPM Alpine)
  laravel-api:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      target: runner
    container_name: cafe-backend-api
    volumes:
      - ./backend:/var/www/html:delegated
      - backend-storage:/var/www/html/storage
      - vendor-volume:/var/www/html/vendor
    environment:
      - APP_ENV=${APP_ENV:-local}
      - APP_DEBUG=${APP_DEBUG:-true}
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-cafe_management}
      - DB_USERNAME=${DB_USER:-cafe_user}
      - DB_PASSWORD=${DB_PASSWORD:-cafe_secure_password_123}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis_secure_password_123}
      - CACHE_STORE=redis
      - QUEUE_CONNECTION=redis
      - SESSION_DRIVER=redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cafe-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${API_MEM_LIMIT:-512M}

  # Laravel Queue Worker (Background Job Processing)
  laravel-worker:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      target: runner
    container_name: cafe-backend-worker
    volumes:
      - ./backend:/var/www/html:delegated
      - backend-storage:/var/www/html/storage
      - vendor-volume:/var/www/html/vendor
    command: php artisan queue:work --tries=3 --backoff=10 --timeout=90
    environment:
      - APP_ENV=${APP_ENV:-local}
      - APP_DEBUG=${APP_DEBUG:-true}
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-cafe_management}
      - DB_USERNAME=${DB_USER:-cafe_user}
      - DB_PASSWORD=${DB_PASSWORD:-cafe_secure_password_123}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis_secure_password_123}
      - CACHE_STORE=redis
      - QUEUE_CONNECTION=redis
      - SESSION_DRIVER=redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cafe-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${WORKER_MEM_LIMIT:-256M}

  # Laravel Task Scheduler (Cron Runner)
  laravel-scheduler:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      target: runner
    container_name: cafe-backend-scheduler
    volumes:
      - ./backend:/var/www/html:delegated
      - backend-storage:/var/www/html/storage
      - vendor-volume:/var/www/html/vendor
    command: php artisan schedule:work
    environment:
      - APP_ENV=${APP_ENV:-local}
      - APP_DEBUG=${APP_DEBUG:-true}
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-cafe_management}
      - DB_USERNAME=${DB_USER:-cafe_user}
      - DB_PASSWORD=${DB_PASSWORD:-cafe_secure_password_123}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis_secure_password_123}
      - CACHE_STORE=redis
      - QUEUE_CONNECTION=redis
      - SESSION_DRIVER=redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cafe-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${SCHEDULER_MEM_LIMIT:-128M}

  # Primary Database (PostgreSQL 16)
  postgres:
    image: postgres:16-alpine
    container_name: cafe-postgres
    environment:
      - POSTGRES_DB=${DB_DATABASE:-cafe_management}
      - POSTGRES_USER=${DB_USER:-cafe_user}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-cafe_secure_password_123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    networks:
      - cafe-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-cafe_user} -d ${DB_DATABASE:-cafe_management}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: ${DB_MEM_LIMIT:-512M}

  # Caching and Queue Broker (Redis 7)
  redis:
    image: redis:7-alpine
    container_name: cafe-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secure_password_123}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - cafe-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secure_password_123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: ${REDIS_MEM_LIMIT:-256M}

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend-storage:
    driver: local
  vendor-volume:
    driver: local

networks:
  cafe-network:
    driver: bridge
