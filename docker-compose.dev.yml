services:
  # Nginx development override to mount dev-default.conf
  nginx:
    volumes:
      - type: bind
        source: ./nginx/conf.d/dev-default.conf
        target: /etc/nginx/conf.d/default.conf
        read_only: true

  # Vite dev server dengan volume mount — hot reload tanpa rebuild
  react-app-dev:
    image: node:20-alpine
    container_name: cafe-frontend-dev
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    networks:
      - cafe-network
    restart: unless-stopped
    environment:
      - CHOKIDAR_USEPOLLING=1
      - WATCHPACK_POLLING=true

  # Composer — install PHP dependencies into vendor-volume (defined in docker-compose.yml)
  composer:
    image: composer:2.8
    container_name: cafe-composer
    working_dir: /app
    volumes:
      - ./backend:/app
      - vendor-volume:/app/vendor
    networks:
      - cafe-network
    profiles:
      - dev
    command: composer install --no-interaction --prefer-dist --no-dev

